<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Phi Omega — Business Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #2929CC;
    --blue-dark: #1a1a99;
    --blue-pale: #ebebff;
    --gold: #CFB53B;
    --gold-dark: #a8911e;
    --navy: #0d0d40;
    --off-white: #f4f6fc;
    --text: #0d1230;
    --muted: #5a6080;
    --border: #d0d4ee;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--off-white); font-family:'Lato',sans-serif; color:var(--text); min-height:100vh; }

  .gold-stripe { height:6px; background:linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-dark)); }

  header {
    background:linear-gradient(140deg, var(--navy) 0%, var(--blue-dark) 55%, var(--blue) 100%);
    position:relative; overflow:hidden;
  }
  header::before {
    content:''; position:absolute; inset:0;
    background:repeating-linear-gradient(-50deg,transparent,transparent 30px,rgba(207,181,59,.04) 30px,rgba(207,181,59,.04) 31px);
    pointer-events:none;
  }
  .header-inner {
    max-width:1200px; margin:0 auto; padding:24px 32px;
    display:flex; align-items:center; gap:28px; position:relative; z-index:1;
  }
  .logo-wrap {
    flex-shrink:0; width:130px; height:96px; background:white; border-radius:12px;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
    box-shadow:0 4px 16px rgba(0,0,0,.25),0 0 0 3px rgba(207,181,59,.4); padding:8px;
  }
  .logo-wrap img { width:100%; height:100%; object-fit:contain; }
  .header-text { flex:1; }
  .org-name { font-family:'Libre Baskerville',serif; font-size:27px; font-weight:700; color:#fff; line-height:1.2; }
  .org-name span { color:var(--gold); }
  .subtitle { font-size:12.5px; color:rgba(255,255,255,.5); margin-top:7px; font-weight:300; letter-spacing:.5px; }
  .pillars { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
  .pillar {
    font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--gold); background:rgba(207,181,59,.12); border:1px solid rgba(207,181,59,.3);
    padding:4px 13px; border-radius:20px;
  }

  .stats-bar { background:var(--gold); padding:10px 32px; }
  .stats-inner { max-width:1200px; margin:0 auto; display:flex; gap:28px; flex-wrap:wrap; }
  .stat { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--navy); font-weight:700; }
  .stat span { font-weight:400; }

  main { max-width:1200px; margin:0 auto; padding:32px 32px 64px; }

  .controls { display:flex; gap:8px; margin-bottom:28px; flex-wrap:wrap; align-items:center; }
  .search-box { flex:1; min-width:240px; position:relative; }
  .search-box input {
    width:100%; padding:13px 16px 13px 44px; border:2px solid var(--border); border-radius:10px;
    font-family:'Lato',sans-serif; font-size:14px; background:white; color:var(--text); outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  .search-box input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(41,41,204,.1); }
  .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:16px; pointer-events:none; }

  .filters { display:flex; gap:7px; flex-wrap:wrap; }
  .filter-btn {
    padding:9px 13px; border:2px solid var(--border); border-radius:10px;
    background:white; font-family:'Lato',sans-serif; font-size:12px; font-weight:700;
    color:var(--muted); cursor:pointer; transition:all .2s; white-space:nowrap;
  }
  .filter-btn.active { background:var(--blue); color:white; border-color:var(--blue); }
  .filter-btn:hover:not(.active) { border-color:var(--blue); color:var(--blue); }

  .result-count { font-size:13px; color:var(--muted); margin-bottom:16px; }
  .result-count strong { color:var(--blue); }

  .section-header { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
  .section-label { font-family:'Libre Baskerville',serif; font-size:11px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--blue); white-space:nowrap; }
  .section-line { flex:1; height:1px; background:linear-gradient(90deg, var(--border), transparent); }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:18px; }

  .card {
    background:white; border-radius:14px; border:1px solid var(--border);
    overflow:hidden; transition:transform .2s, box-shadow .2s;
    animation:fadeUp .4s ease both; position:relative;
  }
  .card:hover { transform:translateY(-4px); box-shadow:0 14px 36px rgba(41,41,204,.12); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  .card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
    background:var(--gold); border-radius:14px 0 0 14px;
  }
  .card-accent { height:4px; margin-left:4px; }
  .card-body { padding:15px 18px 18px 20px; }

  .type-tag {
    display:inline-flex; align-items:center; gap:5px;
    font-size:10.5px; font-weight:700; letter-spacing:.8px; text-transform:uppercase;
    padding:3px 10px; border-radius:20px; margin-bottom:9px;
  }
  .card-name {
    font-family:'Libre Baskerville',serif; font-size:15.5px; font-weight:700;
    color:var(--blue-dark); line-height:1.3; margin-bottom:8px;
  }
  .card-meta { font-size:12.5px; color:var(--muted); margin-bottom:4px; display:flex; align-items:flex-start; gap:5px; line-height:1.4; }
  .card-meta strong { color:var(--text); font-weight:700; }
  .card-meta .icon { flex-shrink:0; margin-top:1px; }

  /* Area field styled distinctly */
  .card-area {
    display:inline-flex; align-items:center; gap:6px;
    font-size:12px; font-weight:700;
    color:var(--blue-dark);
    background:var(--blue-pale);
    border:1px solid rgba(41,41,204,.2);
    padding:3px 10px; border-radius:8px;
    margin-bottom:8px;
  }

  .card-divider { height:1px; background:var(--border); margin:10px 0; }

  .card-footer { display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; }
  .contact { font-size:11.5px; color:var(--muted); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .chapter-badge { font-size:10px; color:var(--muted); background:var(--off-white); border:1px solid var(--border); padding:3px 9px; border-radius:7px; font-weight:700; white-space:nowrap; }

  /* Category colors */
  .c-legal        .card-accent { background:#7d3c98; } .c-legal        .type-tag { background:#f5eafb; color:#6c3483; }
  .c-realestate   .card-accent { background:#1a6ba0; } .c-realestate   .type-tag { background:#e6f2fb; color:#1a6ba0; }
  .c-health       .card-accent { background:#16a085; } .c-health       .type-tag { background:#e8f6f3; color:#0f7866; }
  .c-construction .card-accent { background:#d35400; } .c-construction .type-tag { background:#fef0e6; color:#b04500; }
  .c-education    .card-accent { background:#1e8449; } .c-education    .type-tag { background:#eafbf1; color:#1e8449; }
  .c-food         .card-accent { background:#e67e22; } .c-food         .type-tag { background:#fef0e0; color:#b85c0a; }
  .c-retail       .card-accent { background:#2980b9; } .c-retail       .type-tag { background:#e6f0fb; color:#2471a3; }
  .c-travel       .card-accent { background:#27ae60; } .c-travel       .type-tag { background:#eaf8ef; color:#1d8048; }
  .c-other        .card-accent { background:#7f8c8d; } .c-other        .type-tag { background:#f2f3f4; color:#5d6d7e; }

  .no-results { grid-column:1/-1; text-align:center; padding:60px; color:var(--muted); font-size:15px; }

  footer {
    background:var(--navy); color:rgba(255,255,255,.45);
    padding:26px 32px; text-align:center; font-size:12px; letter-spacing:.5px;
  }
  footer .motto { font-family:'Libre Baskerville',serif; font-style:italic; font-size:13px; color:rgba(255,255,255,.75); margin-bottom:7px; letter-spacing:1px; }
  footer .gold { color:var(--gold); font-weight:700; }

  @media(max-width:640px){
    .header-inner { flex-wrap:wrap; gap:14px; }
    .org-name { font-size:20px; }
    main { padding:20px 14px 48px; }
    .grid { grid-template-columns:1fr; }
  }
</style>
</head>

  if (t.includes('travel') || t.includes('tour')) return 'travel';
  return 'other';
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('grid');

  const filtered = DATA.filter(b => {
    const cat = getCategory(b.type);
    const matchFilter = currentFilter === 'all' || cat === currentFilter;
    const hay = [b.name, b.owner, b.area, b.location, b.type, b.chapter, b.contact].join(' ').toLowerCase();
    return matchFilter && (!q || hay.includes(q));
  });

  document.getElementById('resultCount').innerHTML =
    `Showing <strong>${filtered.length}</strong> of <strong>${DATA.length}</strong> businesses`;

  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">😕 No businesses found. Try a different search or filter.</div>';
    return;
  }

  grid.innerHTML = filtered.map((b, i) => {
    const cat  = getCategory(b.type);
    const info = catMap[cat];
    const shortType = (b.type||'').split(' - ')[0].split(',')[0].trim().substring(0, 30);
    const delay = (i % 12) * 0.04;
    return `
    <div class="card c-${cat}" style="animation-delay:${delay}s">
      <div class="card-accent"></div>
      <div class="card-body">
        <div class="type-tag">${info.icon} ${esc(shortType)}</div>
        <div class="card-name">${esc(b.name)}</div>
        <div class="card-meta"><span class="icon">👤</span><span>Owner: <strong>${esc(b.owner)}</strong></span></div>
        <div class="card-area">🗺️ ${esc(b.area)}</div>
        <div class="card-meta"><span class="icon">📍</span><span>${esc(b.location)}</span></div>
        <div class="card-divider"></div>
        <div class="card-footer">
          <div class="contact">📞 ${esc((b.contact||'N/A').split('\n')[0].substring(0,40))}</div>
          <div class="chapter-badge">Ch. ${esc(b.chapter)}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setFilter(btn, type) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

render();
</script>
</body>
</html>
